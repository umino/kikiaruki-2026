<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>利き歩きナビ 2026 v3</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
:root{
--bg:#0f0f0f;--bg2:#1c1816;--bg3:#151210;--border:#2a2420;--border2:#3a2020;
--text:#e8e4de;--text2:#a89090;--text3:#6a5a50;--text-brew:#c8a880;
--accent:#c0392b;--accent2:#e74c3c;--accent-bg:#3a1515;
--gold:#d4a050;--gold-bg:#3a2a1a;--gold-border:#8a6a3a;
--plan:#d4c870;--plan-bg:#3a3a10;--plan-border:#5a5a10;
--green:#6c6;--green-bg:#2a4a2a;
--card-done-opacity:.5;--hdr-bg:linear-gradient(135deg,#1a0a0a,#2a1215,#1a0a0a);
--photo-border:#3a2a1a;--tag-text:#fff;
--nav-bg:linear-gradient(135deg,#8b2020,#a03030);
--sake-chk-border:#4a3a2a;--star-off:#3a3020;
}
.light{
--bg:#f5efe0;--bg2:#fff;--bg3:#f0ebe0;--border:#d8cfc0;--border2:#c8a080;
--text:#2a2018;--text2:#6a5a4a;--text3:#8a7a6a;--text-brew:#8a5a30;
--accent:#c8202a;--accent2:#e8303a;--accent-bg:#fce8e8;
--gold:#8a6a20;--gold-bg:#f5ecd0;--gold-border:#c8a040;
--plan:#6a6a10;--plan-bg:#f0f0d0;--plan-border:#a0a040;
--green:#2a7a2a;--green-bg:#d8f0d8;
--card-done-opacity:.45;--hdr-bg:linear-gradient(135deg,#f8f0e0,#f5e8e0,#f8f0e0);
--photo-border:#d8c8b0;--tag-text:#fff;
--nav-bg:linear-gradient(135deg,#c8202a,#d83838);
--sake-chk-border:#c8b8a0;--star-off:#d8d0c0;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:90px;overflow-x:hidden;transition:background .3s,color .3s}
button,input,textarea,select{font-family:inherit;transition:background .3s,color .3s,border-color .3s}

.hdr{background:var(--hdr-bg);border-bottom:1px solid var(--border2);padding:env(safe-area-inset-top,0) 14px 10px;padding-top:max(14px,env(safe-area-inset-top));position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:baseline;gap:8px}
.hdr h1{font-size:19px;font-weight:800;color:var(--accent2);letter-spacing:.04em}
.hdr .sub{font-size:10px;color:var(--text3)}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-top:6px;gap:6px;flex-wrap:wrap}
.stat{font-size:11px;color:var(--text2)}.stat b{color:var(--text)}
.pbar{margin-top:6px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .4s}
.ctrls{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.cbtn{background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:14px;padding:3px 9px;font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap}
.cbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.cbtn.grn{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.cbtn.theme{background:var(--gold-bg);border-color:var(--gold-border);color:var(--gold)}
.geo-w{margin-top:4px;font-size:9px;color:#e07050;background:#2a1515;padding:2px 8px;border-radius:4px;display:none}

.tabs{display:flex;border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:99;background:var(--bg)}
.tab{flex:1;text-align:center;padding:10px 4px;font-size:12px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.on{color:var(--accent2);border-bottom-color:var(--accent)}
.tab .badge{background:var(--accent);color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;margin-left:3px}

.start-sel{background:var(--bg2);border:1px solid var(--border);margin:6px 10px;border-radius:8px;padding:8px 10px}
.start-sel label{font-size:10px;color:var(--text3);font-weight:700;display:block;margin-bottom:4px}
.start-sel select{width:100%;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:12px;-webkit-appearance:none;appearance:none}

.ri{background:var(--plan-bg);border:1px solid var(--plan-border);margin:6px 10px;border-radius:8px;padding:10px;display:none}
.ri.show{display:block}
.ri-title{font-size:11px;color:var(--plan);font-weight:700}
.ri-stats{display:flex;gap:12px;margin-top:4px}
.ri-stat{font-size:18px;font-weight:800;color:var(--plan)}.ri-unit{font-size:10px;color:var(--text3);margin-left:2px}
.ri-sub{font-size:10px;color:var(--text3);margin-top:2px}
.ri-btns{display:flex;gap:6px;margin-top:6px}
.ri-btn{flex:1;padding:7px;border-radius:6px;border:none;font-size:10px;font-weight:700;cursor:pointer}
.ri-btn.pri{background:var(--plan-bg);border:1px solid var(--plan-border);color:var(--plan)}
.ri-btn.sec{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.ri-btn:active{filter:brightness(.85)}
.ri-load{font-size:10px;color:var(--plan);margin-top:4px;display:none}
.ri-load.show{display:block}

.filters{display:flex;gap:4px;padding:6px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.ftab{background:var(--bg2);color:var(--text3);border:1px solid var(--border);border-radius:12px;padding:3px 9px;font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.ftab.on{background:var(--accent-bg);color:var(--accent2);border-color:var(--accent)}

.cards{padding:0 8px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;overflow:hidden;transition:opacity .3s}
.card.done{opacity:var(--card-done-opacity)}
.card-head{padding:8px 10px;cursor:pointer;display:flex;align-items:flex-start;gap:8px}
.card-photo{width:48px;height:48px;border-radius:6px;object-fit:cover;border:1px solid var(--photo-border);flex-shrink:0;background:var(--bg3)}
.card-left{flex:1;min-width:0}
.card-tags{display:flex;align-items:center;gap:3px;flex-wrap:wrap}
.ptag{color:var(--tag-text);font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px}
.ntag{font-size:9px;color:var(--text3)}
.dtag{font-size:9px;color:var(--text2)}
.plan-num{background:var(--plan-border);color:var(--plan);font-size:9px;font-weight:800;padding:1px 5px;border-radius:3px}
.kaisen-tag{background:#5a1a3a;color:#f0a0c0;font-size:8px;padding:1px 4px;border-radius:3px;font-weight:600}
.light .kaisen-tag{background:#fce0f0;color:#a02060}
.card-name{font-size:13px;font-weight:700;margin-top:2px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card.done .card-name{color:var(--text3)}
.card-brew{font-size:11px;color:var(--text-brew);margin-top:1px}
.card-preview{font-size:9px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-right{display:flex;align-items:center;gap:5px;flex-shrink:0;padding-top:2px}
.plan-toggle{width:26px;height:26px;border-radius:5px;border:1.5px solid var(--plan-border);background:transparent;color:var(--plan-border);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.plan-toggle.on{background:var(--plan-bg);border-color:var(--plan);color:var(--plan)}
.chk{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--sake-chk-border);background:transparent;color:transparent;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.chk.on{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.arrow{font-size:10px;color:var(--text3);transition:transform .2s}
.arrow.open{transform:rotate(90deg)}

.card-body{display:none;padding:0 10px 10px;border-top:1px solid var(--border)}
.card-body.open{display:block}

.nav-row{display:flex;gap:5px;margin-top:6px}
.nav-btn{flex:1;border:none;border-radius:6px;padding:8px 4px;font-size:10px;font-weight:700;cursor:pointer;text-align:center}
.nav-btn.route{background:var(--nav-bg);color:#fff}
.nav-btn.pin{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.nav-btn:active{filter:brightness(.85)}

.slabel{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:8px 0 4px;font-weight:700}

.food-item{font-size:11px;color:var(--text2);padding:3px 0;display:flex;justify-content:space-between}
.food-price{color:var(--gold);font-weight:600;font-size:10px}

.sake-item{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid var(--bg3)}
.sake-chk{width:18px;height:18px;border-radius:3px;border:1.5px solid var(--sake-chk-border);background:transparent;color:transparent;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sake-chk.on{background:var(--gold-bg);border-color:var(--gold-border);color:var(--gold)}
.sake-info{flex:1;min-width:0}
.sake-name{font-size:10px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.sake-meta{font-size:8px;color:var(--text3)}
.sake-ctrls{display:flex;align-items:center;gap:2px}
.cup-btn{width:20px;height:20px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cup-cnt{font-size:10px;color:var(--gold);min-width:12px;text-align:center;font-weight:700}
.stars-row{display:flex;align-items:center;justify-content:space-between;padding:1px 0 2px 23px}
.stars{display:flex;gap:0}
.star{font-size:12px;cursor:pointer;color:var(--star-off);line-height:1}
.star.on{color:var(--gold)}
.sake-time{font-size:8px;color:var(--text3)}

.memo-area{margin-top:6px}
.memo-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:5px;font-size:10px;color:var(--text);resize:none;outline:none;min-height:28px}
.memo-input:focus{border-color:var(--gold-border)}
.memo-input::placeholder{color:var(--text3)}
.return-row{display:flex;align-items:center;justify-content:space-between;margin-top:5px}
.return-label{font-size:10px;color:var(--text3)}
.return-btn{padding:2px 8px;border-radius:10px;border:1px solid var(--border);background:transparent;font-size:10px;cursor:pointer;color:var(--text3)}
.return-btn.on{background:var(--gold-bg);border-color:var(--gold-border);color:var(--gold)}
.visit-time{font-size:9px;color:var(--text3);margin-top:3px}

.empty{text-align:center;padding:40px 16px;color:var(--text3);font-size:12px;line-height:1.8}
.footer{text-align:center;font-size:9px;color:var(--text3);padding:16px 10px}
.export-btn{background:var(--bg2);color:var(--text2);border:1px solid var(--border);border-radius:5px;padding:4px 10px;font-size:10px;cursor:pointer;margin-top:4px}
</style>
</head>

const PC={"青森":"#2563eb","岩手":"#059669","秋田":"#d97706","山形":"#dc2626","宮城":"#7c3aed","福島":"#0891b2","栃木":"#65a30d","群馬":"#ca8a04","埼玉":"#0d9488","千葉":"#e11d48","茨城":"#4f46e5","神奈川":"#0284c7","新潟":"#2563eb","長野":"#059669","富山":"#7c3aed","石川":"#0891b2","福井":"#ca8a04","静岡":"#16a34a","岐阜":"#9333ea","愛知":"#dc2626","三重":"#d97706","京都":"#be185d","滋賀":"#0d9488","奈良":"#9333ea","兵庫":"#1d4ed8","広島":"#b91c1c","岡山":"#a16207","島根":"#065f46","山口":"#7c2d12","愛媛":"#ea580c","高知":"#15803d","佐賀":"#6d28d9"};
const OSRM="https://router.project-osrm.org";

let D,pos=null,sortDist=false,curTab="all",rFilter="all",openId=null;

function load(){try{D=JSON.parse(localStorage.getItem("kiki2026v3"))||{}}catch(e){D={}}
if(!D.mp)D.mp="google";if(!D.st)D.st={};if(!D.pl)D.pl={ids:[],opt:false,td:null,tt:null};if(!D.sp)D.sp="sasaki";if(!D.th)D.th="dark"}
function save(){try{localStorage.setItem("kiki2026v3",JSON.stringify(D))}catch(e){}}
function gs(id){if(!D.st[id])D.st[id]={v:false,vt:null,m:"",wr:false,dr:{}};return D.st[id]}

function gd(a,b,c,d){const R=6371e3,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180;const z=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z))}
function fd(m){return m<1000?Math.round(m)+"m":(m/1000).toFixed(1)+"km"}
function wm(m){return Math.round(m/80)}
function now(){const d=new Date();return d.getHours()+":"+String(d.getMinutes()).padStart(2,"0")}
function mp(p){return p.split("/")[0].trim()}
function pc(p){return PC[mp(p)]||"#666"}
function gr(p){for(const[r,a]of Object.entries(RG))for(const x of p.split("/"))if(a.includes(x.trim()))return r;return"他"}
function tc(){let c=0;for(const st of Object.values(D.st))for(const d of Object.values(st.dr||{}))c+=(d.c||0);return c}
function ip(id){return D.pl.ids.includes(id)}
function getStart(){if(D.sp==="gps"&&pos)return{la:pos.lat,lo:pos.lng};return STARTS[D.sp]||STARTS.sasaki}

function navUrl(la,lo){return D.mp==="apple"?"https://maps.apple.com/?daddr="+la+","+lo+"&dirflg=w":"https://www.google.com/maps/dir/?api=1&destination="+la+","+lo+"&travelmode=walking"}
function pinUrl(la,lo,name){return D.mp==="apple"?"https://maps.apple.com/?ll="+la+","+lo+"&q="+encodeURIComponent(name):"https://www.google.com/maps/search/?api=1&query="+la+","+lo}

// Theme
function toggleTheme(){D.th=D.th==="dark"?"light":"dark";save();applyTheme()}
function applyTheme(){document.body.className=D.th==="light"?"light":"";document.getElementById("themeBtn").textContent=D.th==="light"?"☀️":"🌙"}

// OSRM
async function osrmTrip(coords){
const cs=coords.map(c=>c.lo+","+c.la).join(";");
const r=await fetch(OSRM+"/trip/v1/driving/"+cs+"?roundtrip=false&source=first&geometries=geojson&overview=false");
const j=await r.json();if(j.code!=="Ok")throw new Error(j.message);
const order=j.waypoints.sort((a,b)=>a.waypoint_index-b.waypoint_index).map(w=>j.waypoints.indexOf(w));
return{order,distance:j.trips[0].distance,duration:j.trips[0].duration}}

let distCache={},dcTime=0;
async function updateDists(){
if(!pos)return;if(Date.now()-dcTime<60000)return;
const ids=S.map(s=>s.id);if(!ids.length)return;
try{const all=[{lo:pos.lng,la:pos.lat},...ids.map(id=>{const s=S.find(x=>x.id===id);return{lo:s.lo,la:s.la}})];
const cs=all.map(c=>c.lo+","+c.la).join(";");const dests=ids.map((_,i)=>i+1).join(";");
const r=await fetch(OSRM+"/table/v1/driving/"+cs+"?sources=0&destinations="+dests+"&annotations=distance");
const j=await r.json();if(j.code==="Ok"){ids.forEach((id,i)=>{distCache[id]=j.distances[0][i]});dcTime=Date.now();render()}}catch(e){}}

async function optimizeRoute(){
const ids=D.pl.ids.filter(id=>!gs(id).v);if(ids.length<2){alert("未訪問2店以上が必要");return}
showLoad(true);
try{const st=getStart();const coords=[{la:st.la,lo:st.lo},...ids.map(id=>{const s=S.find(x=>x.id===id);return{la:s.la,lo:s.lo}})];
const r=await osrmTrip(coords);const re=r.order.slice(1).map(i=>ids[i-1]).filter(Boolean);
const vi=D.pl.ids.filter(id=>gs(id).v);D.pl.ids=[...vi,...re];D.pl.opt=true;D.pl.td=r.distance;D.pl.tt=r.duration;save();render()}
catch(e){alert("OSRM接続エラー: "+e.message)}showLoad(false)}

async function reoptFromHere(){
if(!pos){alert("現在地が取得できていません");return}
const ids=D.pl.ids.filter(id=>!gs(id).v);if(ids.length<2){alert("未訪問2店以上が必要");return}
showLoad(true);
try{const coords=[{la:pos.lat,lo:pos.lng},...ids.map(id=>{const s=S.find(x=>x.id===id);return{la:s.la,lo:s.lo}})];
const r=await osrmTrip(coords);const re=r.order.slice(1).map(i=>ids[i-1]).filter(Boolean);
const vi=D.pl.ids.filter(id=>gs(id).v);D.pl.ids=[...vi,...re];D.pl.opt=true;D.pl.td=r.distance;D.pl.tt=r.duration;save();render()}
catch(e){alert("OSRM接続エラー: "+e.message)}showLoad(false)}

function showLoad(on){document.getElementById("riLoad").className="ri-load"+(on?" show":"")}

// Actions
function setTab(t){curTab=t;rFilter="all";openId=null;render()}
function toggleSort(){sortDist=!sortDist;if(sortDist&&pos)updateDists();render()}
function toggleMap(){D.mp=D.mp==="google"?"apple":"google";save();render()}
function setStart(v){D.sp=v;D.pl.opt=false;save();render()}
function setRegion(r){rFilter=r;render()}
function toggleOpen(id){openId=openId===id?null:id;render()}
function togglePlan(id,e){e&&e.stopPropagation();if(ip(id)){D.pl.ids=D.pl.ids.filter(x=>x!==id);D.pl.opt=false}else{D.pl.ids.push(id);D.pl.opt=false}save();render()}
function toggleVisit(id,e){e&&e.stopPropagation();const st=gs(id);st.v=!st.v;st.vt=st.v?now():null;save();render()}
function toggleDrink(sid,di,e){e&&e.stopPropagation();const st=gs(sid);if(!st.dr[di])st.dr[di]={c:0,t:null,r:0};const d=st.dr[di];if(d.c===0){d.c=1;d.t=now()}else{d.c=0;d.t=null;d.r=0}save();render()}
function addCup(sid,di,delta,e){e&&e.stopPropagation();const st=gs(sid);if(!st.dr[di])st.dr[di]={c:0,t:null,r:0};const d=st.dr[di];d.c=Math.max(0,d.c+delta);if(d.c>0&&!d.t)d.t=now();if(d.c===0){d.t=null;d.r=0}save();render()}
function setRating(sid,di,r,e){e&&e.stopPropagation();const st=gs(sid);if(!st.dr[di])st.dr[di]={c:0,t:null,r:0};st.dr[di].r=st.dr[di].r===r?0:r;save();render()}
function setMemo(sid,v){gs(sid).m=v;save()}
function toggleReturn(sid){gs(sid).wr=!gs(sid).wr;save();render()}

const vc=S.filter(s=>gs(s.id).v).length;
document.getElementById("stat").innerHTML=vc===52?"🎉 全店制覇！":"訪問 <b>"+vc+"</b>/52";

document.getElementById("pbar").style.width=(vc/52*100)+"%";

mb.className="cbtn grn";

sb.textContent=sortDist?"📍 近い順":"📋 番号順";

// Tabs
["All","Plan","Log"].forEach(t=>{document.getElementById("tab"+t).className="tab"+(curTab===t.toLowerCase()?" on":"")});

// Start selector

// Route info
const ri=document.getElementById("ri");
if(curTab==="plan"&&D.pl.ids.length>0){
ri.className="ri show";const unv=D.pl.ids.filter(id=>!gs(id).v).length;
document.getElementById("riStops").textContent=unv;
if(D.pl.td!=null){document.getElementById("riDist").textContent=(D.pl.td/1000).toFixed(1);
document.getElementById("riTime").textContent=wm(D.pl.td);
document.getElementById("riSub").textContent=D.pl.opt?"✅ OSRM最適化済み":"⚡ 未最適化"}
else{let e=0;const pids=D.pl.ids.filter(id=>!gs(id).v);let prev=getStart();
pids.forEach(id=>{const s=S.find(x=>x.id===id);e+=gd(prev.la,prev.lo,s.la,s.lo);prev={la:s.la,lo:s.lo}});
document.getElementById("riDist").textContent=(e/1000).toFixed(1);
document.getElementById("riTime").textContent=wm(e);
document.getElementById("riSub").textContent="📏 直線距離（最適化で改善可能）"}
document.getElementById("riTitle").textContent=D.pl.opt?"✅ 最適化済みルート":"📐 ルート概算"
}else ri.className="ri";

// Filters
const ff=document.getElementById("filters");
if(curTab==="all"){
const ts=[{k:"all",l:"全て"},...Object.keys(RG).map(r=>({k:r,l:r}))];
ff.innerHTML=ts.map(t=>'<button class="ftab'+(rFilter===t.k?' on':'')+'" onclick="setRegion(\''+t.k+'\')">'+t.l+'</button>').join("");
ff.style.display="flex"}else ff.style.display="none";

// Cards
let stores=[];
if(curTab==="plan")stores=D.pl.ids.map(id=>S.find(s=>s.id===id)).filter(Boolean);
else if(curTab==="log")stores=S.filter(s=>gs(s.id).v);
else{stores=[...S];if(rFilter!=="all")stores=stores.filter(s=>gr(s.p)===rFilter)}
if(sortDist&&pos){stores.sort((a,b)=>{const av=gs(a.id).v?1:0,bv=gs(b.id).v?1:0;if(av!==bv)return av-bv;
const da=distCache[a.id]||gd(pos.lat,pos.lng,a.la,a.lo);const db=distCache[b.id]||gd(pos.lat,pos.lng,b.la,b.lo);return da-db})}

const c=document.getElementById("cards");
if(!stores.length){c.innerHTML='<div class="empty">'+(curTab==="plan"?"プランが空です<br>「全店舗」タブで ＋ を押して追加":curTab==="log"?"まだ訪問した店がありません":"該当なし")+'</div>';return}

c.innerHTML=stores.map((s,idx)=>{
const st=gs(s.id),done=st.v,d=pos?(distCache[s.id]||gd(pos.lat,pos.lng,s.la,s.lo)):null;
const isO=openId===s.id,inP=ip(s.id),pIdx=curTab==="plan"?idx:-1;
const dCnt=Object.values(st.dr).reduce((a,d)=>a+(d.c||0),0);
const hasK=s.s.some(sk=>sk.k);

let h='<div class="card'+(done?' done':'')+'">';
h+='<div class="card-head" onclick="toggleOpen('+s.id+')">';
if(s.th)h+='<img class="card-photo" src="'+s.th+'" loading="lazy" onerror="this.style.display=\'none\'">';
h+='<div class="card-left"><div class="card-tags">';
if(pIdx>=0)h+='<span class="plan-num">'+(pIdx+1)+'</span>';
h+='<span class="ptag" style="background:'+pc(s.p)+'">'+mp(s.p)+'</span>';
h+='<span class="ntag">No.'+s.id+'</span>';
if(d!=null){const isR=!!distCache[s.id];h+='<span class="dtag">'+(isR?"🚶":"📍")+fd(d)+(isR?" ~"+wm(d)+"分":"")+'</span>'}
if(dCnt>0)h+='<span class="dtag">🍶'+dCnt+'</span>';
if(hasK)h+='<span class="kaisen-tag">⏰ 時間限定酒</span>';
h+='</div><div class="card-name">'+s.n+'</div>';
h+='<div class="card-brew">'+s.b+'（'+s.p+'）</div>';
if(!isO&&s.f.length)h+='<div class="card-preview">🍽 '+s.f.map(f=>f.n).join('、')+'</div>';
h+='</div><div class="card-right">';
if(curTab!=="log")h+='<button class="plan-toggle'+(inP?' on':'')+'" onclick="togglePlan('+s.id+',event)">'+(inP?"★":"＋")+'</button>';
h+='<button class="chk'+(done?' on':'')+'" onclick="toggleVisit('+s.id+',event)">'+(done?"✓":"")+'</button>';
h+='<span class="arrow'+(isO?' open':'')+'">▶</span></div></div>';

h+='<div class="card-body'+(isO?' open':'')+'">';
if(isO){
// Photo large
if(s.ph)h+='<img src="'+s.ph+'" style="width:100%;border-radius:6px;margin-top:6px" loading="lazy" onerror="this.style.display=\'none\'">';
// Nav buttons
h+='<div class="nav-row">';
h+='<button class="nav-btn route" onclick="window.open(\''+navUrl(s.la,s.lo)+'\',\'_blank\')">'+(D.mp==="apple"?"🍎":"🗺")+" ナビ</button>";
h+='<button class="nav-btn pin" onclick="window.open(\''+pinUrl(s.la,s.lo,s.n)+'\',\'_blank\')">📍 地図</button>';
h+='</div>';
if(st.vt)h+='<div class="visit-time">✅ '+st.vt+' チェックイン</div>';

// Food
if(s.f.length){h+='<div class="slabel">🍽 フードメニュー</div>';
s.f.forEach(f=>{h+='<div class="food-item"><span>'+f.n+'</span><span class="food-price">'+(f.p?"¥"+f.p.toLocaleString():"価格未定")+'</span></div>'})}

// Sake
h+='<div class="slabel">🍶 出品酒（'+s.s.length+'種）</div>';
s.s.forEach((sk,i)=>{
const dk=st.dr[i]||{c:0,t:null,r:0};const on=dk.c>0;
h+='<div class="sake-item"><button class="sake-chk'+(on?' on':'')+'" onclick="toggleDrink('+s.id+','+i+',event)">'+(on?"✓":"")+'</button>';
h+='<div class="sake-info"><span class="sake-name">'+sk.n+'</span>';
h+='<span class="sake-meta">';
if(sk.p)h+='¥'+sk.p.toLocaleString();
if(sk.v)h+=' ('+sk.v+')';
if(sk.k)h+=' <span class="kaisen-tag">⏰'+sk.k+'</span>';
h+='</span></div>';
h+='<div class="sake-ctrls"><button class="cup-btn" onclick="addCup('+s.id+','+i+',-1,event)">−</button>';
h+='<span class="cup-cnt">'+dk.c+'</span>';
h+='<button class="cup-btn" onclick="addCup('+s.id+','+i+',1,event)">＋</button></div></div>';
h+='<div class="stars-row"><div class="stars">';
for(let r=1;r<=5;r++)h+='<span class="star'+(dk.r>=r?' on':'')+'" onclick="setRating('+s.id+','+i+','+r+',event)">★</span>';
h+='</div>';if(dk.t)h+='<span class="sake-time">'+dk.t+'</span>';h+='</div>'});

// Memo
h+='<div class="memo-area"><div class="slabel">📝 メモ</div>';
h+='<textarea class="memo-input" placeholder="感想、雰囲気など…" oninput="setMemo('+s.id+',this.value)">'+(st.m||'')+'</textarea></div>';
h+='<div class="return-row"><span class="return-label">次回も行きたい？</span>';
h+='<button class="return-btn'+(st.wr?' on':'')+'" onclick="toggleReturn('+s.id+')">'+(st.wr?"⭐ また行く":"☆")+'</button></div>'}
h+='</div></div>';return h}).join("")}

// Export
function exportData(){
let t="# 日本酒利き歩き 2026 テイスティングノート\n# "+new Date().toLocaleString("ja-JP")+"\n\n";
if(D.pl.ids.length>0){t+="## プラン（"+D.pl.ids.length+"店）\n";
D.pl.ids.forEach((id,i)=>{const s=S.find(x=>x.id===id);t+=(i+1)+". "+s.n+"（"+s.b+"）"+(gs(id).v?"✅":"")+"\n"});
if(D.pl.td)t+="総歩行距離: "+(D.pl.td/1000).toFixed(1)+"km / 約"+wm(D.pl.td)+"分\n";t+="\n"}
let cups=0;S.forEach(s=>{const st=gs(s.id);
if(!st.v&&Object.keys(st.dr).length===0&&!st.m)return;
t+="## No."+s.id+" "+s.n+"｜"+s.b+"（"+s.p+"）\n";
if(st.vt)t+="チェックイン: "+st.vt+"\n";if(st.wr)t+="⭐ また行きたい\n";
s.s.forEach((sk,i)=>{const dk=st.dr[i]||{c:0,r:0,t:null};
if(dk.c>0){t+="  🍶 "+sk.n+" — "+dk.c+"杯 "+"★".repeat(dk.r)+"☆".repeat(5-dk.r)+(dk.t?" ("+dk.t+")":"")+"\n";cups+=dk.c}});
if(st.m)t+="  📝 "+st.m+"\n";t+="\n"});
t+="---\n合計: "+S.filter(s=>gs(s.id).v).length+"店 / "+cups+"杯\n";
const blob=new Blob([t],{type:"text/plain;charset=utf-8"});const a=document.createElement("a");
a.href=URL.createObjectURL(blob);a.download="利き歩き2026_記録.txt";a.click();URL.revokeObjectURL(a.href)}

// Sticky positioning: chain header and tabs
function fixSticky(){
const hdr=document.getElementById("hdr");const tabs=document.getElementById("tabBar");
const hh=hdr.offsetHeight;tabs.style.top=hh+"px"}

// Init
load();
if(navigator.geolocation){navigator.geolocation.watchPosition(
p=>{pos={lat:p.coords.latitude,lng:p.coords.longitude};document.getElementById("geoW").style.display="none";render()},
()=>{document.getElementById("geoW").style.display="block"},{enableHighAccuracy:true,maximumAge:10000})}
render();
window.addEventListener("resize",fixSticky);
setTimeout(fixSticky,100);
new MutationObserver(fixSticky).observe(document.getElementById("hdr"),{childList:true,subtree:true});
</script>
</body>
